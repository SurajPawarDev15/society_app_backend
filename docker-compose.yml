version: "3.9"

services:
  db:
    image: postgres:14
    container_name: society_db
    restart: always
    environment:
      POSTGRES_DB: society_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: society_app
    restart: always

    command: >
      sh -c "python manage.py migrate &&
             gunicorn backend.wsgi:application --bind 0.0.0.0:8000"

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      - PYTHONPATH=/app

    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
